    <!-- To use JavaScript inside an HTML file, we link the JavaScript file using the <script> tag. 
    Use the <script> tag with the src attribute
    <script> → used to include JavaScript
    src="script.js" → tells HTML where the JS file is
    Usually the <script> tag is placed before the closing </body> tag. -->

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JS DEMO</title>
    </head>
    <body>
        <h2>Linking JS file to HTML</h2>

        <script src="./conditional.js"> </script>
    </body>
    </html>
