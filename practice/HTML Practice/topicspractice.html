<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>ALL Topics</title>
</head>
<body>
    <h2>Table Example</h2>
    <p>Table is used to descibe the data in rows and columns fashion.</p>

    <table border="2px" cellspacing="0px" cellpadding="10px" width="600px">
        <thead>
            <caption style="color: blue; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 20px;">Student Information</caption>
            <tr>
                <th colspan="2">INFO1(name and Age)</th>
                <th>INFO 2(city)</th>
            </tr>
        <tr>
            <th style="font-size: 15px; background-color: greenyellow; color: brown;">Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td style="background-color: aquamarine; color: brown;">Sangeeta</td>
            <td>24</td>
            <td>Ilkal</td>
        </tr>
        <tr>
            <td>Nishu</td>
            <td>22</td>
            <td>Bagalkot</td>
        </tr>
        <tr>
            <td rowspan="2">Swara</td>
            <td>20</td>
            <td>Banglaore</td>
        </tr>
         <tr>
           
            <td>22</td>
            <td>Ilkal</td>
        </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3" align="center" style="font-weight: bold;">End of Information</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
