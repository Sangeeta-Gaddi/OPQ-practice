     <!-- Formsssss -->

     <h2>Forms</h2>
     <p>Forms are used to take user input</p>

     <!-- <action> attribute :tellus u location where the data/info should go -->
        <!-- <label>:  tells the caption/labe//name in the form   -->
            <!-- <input>:  user to tell which type of the info/data the form accepts and provide the box to get input -->
      <form action="/server">
        <label>Username:</label><br>  
        <!-- if u give <br> then input box goes down -->
        <input type="text"><br><br>

        <label>Password</label><br>
        <input type="password"><br><br>

        <label>Email</label>
        <input type="email">

        <!-- can write this way also, uder label, add input (notr recomended)-->
        <label>Contact
        <input type="number">
        </label><br><br>

 
        <!-- class 03(1hr:18min video) -->
        <!-- Now we need to link/connect this label to input 
         use "for" in <label> and "id" in <input> attribute--------: both should be same 
            and also it hightlights the input(box) when u click on that if u connects them-->

         <label for="name">Username</label>
         <input type="text" id="name"><br><br>

         <!-- Button -->
          <!-- Deafult button will be "submit", i.e default behaviour will be submission(whenever u add any button, it will submit the data,  so specify the type of the button to behave how u want) -->
          <button>Click Me</button><br><br>
 
          <!-- types of button: 1.submit(default)---: submit the data
           2. button type---:just button 
            3. Reset----:it will reset the input fileds/data/greyout the data-->

            <button type="submit">Submit</button>
            <button type="button">Click me</button>
            <button type="reset">Reset Button</button>
            <br><br>



            <!-- "name" attribute:if u want the data/info u filled in the form to gon in the name:value pair then use name attribute   -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="userame">

        <button>Sumbit to get the key:value pair </button>
        <!-- Check this output in the linkkkk(u will see username=Sangeeta or whatever name u write in the Name input box)
         But this not be shown to user/anyone so we can learn this later -->


      </form>
